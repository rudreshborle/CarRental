<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LuxRentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="fade-in" style="display:flex; align-items:center; justify-content:center;">
        <div class="card" style="max-width:400px; width:100%; padding:2rem;">
            <h2 class="text-center mb-2">Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Login</button>
            </form>
            <p class="text-center mt-2" style="font-size:0.9rem; color:var(--text-secondary);">
                Don't have an account? <a href="register.html" style="color:var(--primary-color);">Register here</a>
            </p>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
