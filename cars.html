<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Fleet - LuxRentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .filters {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .filters > div { flex: 1; min-width: 200px; }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="fade-in">
        <h1 class="mb-3">Our Fleet</h1>
        
        <div class="filters">
            <div class="form-group" style="margin-bottom:0;">
                <label>Search</label>
                <input type="text" id="searchInput" class="form-control" placeholder="Search by brand or model...">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Car Type</label>
                <select id="typeFilter" class="form-control">
                    <option value="All">All Types</option>
                    <option value="Sedan">Sedan</option>
                    <option value="SUV">SUV</option>
                    <option value="Electric">Electric</option>
                    <option value="Sports">Sports</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label>Max Price/Day</label>
                <input type="number" id="priceFilter" class="form-control" placeholder="e.g. 150">
            </div>
        </div>

        <div class="grid-container" id="cars-container"></div>
    </main>
    <div id="footer-placeholder"></div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/cars.js"></script>
</body>
</html>
