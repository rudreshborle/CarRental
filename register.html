<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LuxRentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="fade-in" style="display:flex; align-items:center; justify-content:center;">
        <div class="card" style="max-width:600px; width:100%; padding:2rem;">
            <h2 class="text-center mb-2">Create an Account</h2>
            <form id="registerForm">
                <div class="grid-container" style="gap:1rem; grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-control" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="address">Address</label>
                        <input type="text" id="address" class="form-control" required>
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label for="license">Driving License No.</label>
                        <input type="text" id="license" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" class="form-control" required autocomplete="new-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Register</button>
            </form>
            <p class="text-center mt-2" style="font-size:0.9rem; color:var(--text-secondary);">
                Already have an account? <a href="login.html" style="color:var(--primary-color);">Login here</a>
            </p>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
