<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - LuxRentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-top: 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: var(--bg-color);
            font-weight: 600;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div id="navbar-placeholder"></div>
    <main class="fade-in">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
            <h1>Admin Control Panel</h1>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">View Site</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="text-secondary">Total Bookings</div>
                <div class="stat-value" id="totalBookingsStat">0</div>
            </div>
            <div class="stat-card">
                <div class="text-secondary">Total Revenue</div>
                <div class="stat-value" id="totalRevenueStat">$0</div>
            </div>
            <div class="stat-card">
                <div class="text-secondary">Fleet Size</div>
                <div class="stat-value" id="fleetSizeStat">0</div>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center;" class="mb-2">
            <h2>Manage Fleet</h2>
            <button class="btn btn-primary" onclick="document.getElementById('addCarModal').classList.add('active')">+
                Add Car</button>
        </div>

        <div style="overflow-x:auto; margin-bottom: 3rem;">
            <table id="carsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Car</th>
                        <th>Type</th>
                        <th>Price/Day</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <h2 class="mb-2">Recent Bookings</h2>
        <div style="overflow-x:auto;">
            <table id="bookingsTable">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>User ID</th>
                        <th>Car ID</th>
                        <th>Dates</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- Add Car Modal -->
    <div class="modal-overlay" id="addCarModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Car</h2>
                <button class="modal-close"
                    onclick="document.getElementById('addCarModal').classList.remove('active')">&times;</button>
            </div>
            <form id="addCarForm">
                <div class="grid-container"
                    style="gap:1rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" id="carBrand" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="carModel" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="carYear" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <input type="text" id="carType" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Price / Day</label>
                        <input type="number" id="carPrice" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Image (URL or Upload)</label>
                        <input type="url" id="carImage" class="form-control" placeholder="Image URL">
                        <div
                            style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); text-align: center;">
                            - OR -</div>
                        <input type="file" id="carImageFile" class="form-control" accept="image/*"
                            style="margin-top: 0.5rem;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Save Car</button>
            </form>
        </div>
    </div>

    <!-- Edit Car Modal -->
    <div class="modal-overlay" id="editCarModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Car</h2>
                <button class="modal-close"
                    onclick="document.getElementById('editCarModal').classList.remove('active')">&times;</button>
            </div>
            <form id="editCarForm">
                <input type="hidden" id="editCarId">
                <div class="grid-container"
                    style="gap:1rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" id="editCarBrand" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Model</label>
                        <input type="text" id="editCarModel" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="editCarYear" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <input type="text" id="editCarType" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Price / Day</label>
                        <input type="number" id="editCarPrice" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Image (URL or Upload)</label>
                        <input type="url" id="editCarImage" class="form-control" placeholder="Image URL">
                        <div
                            style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-secondary); text-align: center;">
                            - OR -</div>
                        <input type="file" id="editCarImageFile" class="form-control" accept="image/*"
                            style="margin-top: 0.5rem;">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%; margin-top:1rem;">Update Car</button>
            </form>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
