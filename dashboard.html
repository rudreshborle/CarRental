<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard - LuxRentals</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .sidebar {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
            height: fit-content;
        }
        .user-info h3 { margin-bottom: 0.5rem; }
        .user-info p { color: var(--text-secondary); margin-bottom: 2rem; }
        
        .tab-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 1rem;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            transition: 0.2s;
        }
        .tab-btn.active, .tab-btn:hover {
            background: var(--bg-color);
            color: var(--primary-color);
            font-weight: 600;
        }

        .booking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 1rem;
            background: var(--card-bg);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-confirmed { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .status-cancelled { background: rgba(239, 68, 68, 0.1); color: var(--danger-color); }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <main class="fade-in">
        <h1 class="mb-3">My Dashboard</h1>
        <div class="dashboard-grid">
            <aside class="sidebar">
                <div class="user-info">
                    <h3 id="userName">User Name</h3>
                    <p id="userEmail">user@example.com</p>
                </div>
                <nav>
                    <button class="tab-btn active" onclick="switchTab('active-bookings')">Active Bookings</button>
                    <button class="tab-btn" onclick="switchTab('booking-history')">Booking History</button>
                    <button class="tab-btn" onclick="switchTab('payment-history')">Payment History</button>
                </nav>
            </aside>
            
            <div class="content">
                <div id="active-bookings" class="tab-content">
                    <h2 class="mb-2">Active Bookings</h2>
                    <div id="activeBookingsList"></div>
                </div>

                <div id="booking-history" class="tab-content" style="display:none;">
                    <h2 class="mb-2">Booking History</h2>
                    <div id="bookingHistoryList"></div>
                </div>

                <div id="payment-history" class="tab-content" style="display:none;">
                    <h2 class="mb-2">Payment History</h2>
                    <div id="paymentHistoryList"></div>
                </div>
            </div>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
